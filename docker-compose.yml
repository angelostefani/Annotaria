services:
  app:
    build: .
    environment:
      DATABASE_URL: sqlite:///./annotaria.db
      IMAGE_DIR: /app/image_data
      SECRET_KEY: change-me
      ALLOWED_ORIGINS: "*"
    volumes:
      - ./image_data:/app/image_data
      - ./annotaria.db:/app/annotaria.db
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
