{% extends \"base.html\" %}
{% block content %}
<h1 class=\"mb-4\">Cambia password</h1>
<div id=\"toast-container\" class=\"toast-container position-fixed top-0 end-0 p-3\" style=\"z-index: 1100;\">
  <div id=\"save-toast\" class=\"toast align-items-center text-bg-success border-0\" role=\"alert\" aria-live=\"assertive\" aria-atomic=\"true\">
    <div class=\"d-flex\">
      <div class=\"toast-body\" id=\"save-toast-body\">Risposte salvate</div>
      <button type=\"button\" class=\"btn-close btn-close-white me-2 m-auto\" data-bs-dismiss=\"toast\" aria-label=\"Chiudi\"></button>
    </div>
  </div>
</div>
{% if error %}
<div class=\"alert alert-danger\" role=\"alert\">{{ error }}</div>
{% endif %}
{% if success %}
<div class=\"alert alert-success\" role=\"alert\">{{ success }}</div>
{% endif %}
<form method=\"post\" class=\"card shadow-sm p-3 p-md-4\">
  <div class=\"mb-3\">
    <label for=\"current_password\" class=\"form-label\">Password corrente</label>
    <input type=\"password\" class=\"form-control\" id=\"current_password\" name=\"current_password\" required autocomplete=\"current-password\">
  </div>
  <div class=\"mb-3\">
    <label for=\"new_password\" class=\"form-label\">Nuova password</label>
    <input type=\"password\" class=\"form-control\" id=\"new_password\" name=\"new_password\" required minlength=\"8\" autocomplete=\"new-password\">
    <div class=\"form-text\">Minimo 8 caratteri.</div>
  </div>
  <div class=\"mb-4\">
    <label for=\"confirm_password\" class=\"form-label\">Conferma nuova password</label>
    <input type=\"password\" class=\"form-control\" id=\"confirm_password\" name=\"confirm_password\" required minlength=\"8\" autocomplete=\"new-password\">
  </div>
  <div class=\"d-flex justify-content-end\">
    <button type=\"submit\" class=\"btn btn-primary\">Aggiorna password</button>
  </div>
</form>
{% endblock %}
