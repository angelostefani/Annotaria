{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <a class="btn btn-outline-secondary {% if not prev_id %}disabled{% endif %}" {% if prev_id %}href="/ui/images/{{ prev_id }}"{% else %}href="#" tabindex="-1" aria-disabled="true"{% endif %}>&laquo; Precedente</a>
  <h1 class="m-0">{{ image.filename }}</h1>
  <a class="btn btn-outline-secondary {% if not next_id %}disabled{% endif %}" {% if next_id %}href="/ui/images/{{ next_id }}"{% else %}href="#" tabindex="-1" aria-disabled="true"{% endif %}>Successiva &raquo;</a>
  
</div>
<div id="image-wrapper" style="position:relative; display:inline-block;">
  <img id="image" src="{{ image_url }}" class="img-fluid" alt="{{ image.filename }}">
  <canvas id="canvas" style="position:absolute; left:0; top:0;"></canvas>
</div>

<h2 class="mt-4">Domande</h2>
<div id="questionnaire">
  <p id="no-questions-message" class="text-muted mb-0">Nessuna domanda disponibile per questa immagine.</p>
  <form id="answers-form" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span id="question-progress" class="fw-semibold"></span>
      <div>
        <button type="button" class="btn btn-outline-secondary me-2" id="prev-question-btn">Domanda precedente</button>
        <button type="button" class="btn btn-primary" id="next-question-btn">Domanda successiva</button>
      </div>
    </div>
    <div id="question-body">
      <p id="question-text" class="h5"></p>
      <div id="question-options"></div>
    </div>
    <div class="mt-4 d-flex justify-content-end">
      <button type="submit" class="btn btn-success" id="submit-answers-btn">Salva risposte</button>
    </div>
  </form>
</div>

<script>
// Keyboard navigation with arrow keys
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && {{ 'true' if prev_id else 'false' }}) {
    window.location.href = '/ui/images/{{ prev_id }}';
  } else if (e.key === 'ArrowRight' && {{ 'true' if next_id else 'false' }}) {
    window.location.href = '/ui/images/{{ next_id }}';
  }
});

const token = "{{ token }}";
const imageId = {{ image.id }};
const img = document.getElementById('image');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const existingAnnotations = {{ annotations | tojson }};
const labels = {{ labels | tojson }};
const questionsData = {{ questions_data | tojson }};
const answersCache = {{ answer_map | tojson }};

function resizeCanvas() {
  canvas.width = img.clientWidth;
  canvas.height = img.clientHeight;
  drawAnnotations();
}

img.onload = resizeCanvas;
window.onresize = resizeCanvas;

let currentPoints = [];

function drawAnnotations() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  existingAnnotations.forEach(a => {
    ctx.beginPath();
    a.points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.strokeStyle = 'red';
    ctx.stroke();
    const first = a.points[0];
    ctx.fillStyle = 'red';
    ctx.fillText(a.label, first.x, first.y - 4);
  });
  if (currentPoints.length > 0) {
    ctx.beginPath();
    currentPoints.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.strokeStyle = 'red';
    ctx.stroke();
  }
}

canvas.addEventListener('click', e => {
  currentPoints.push({x: e.offsetX, y: e.offsetY});
  drawAnnotations();
});

canvas.addEventListener('dblclick', () => {
  if (currentPoints.length < 3) {
    currentPoints = [];
    drawAnnotations();
    return;
  }
  const labelPrompt = labels.map(l => `${l.id}: ${l.name}`).join('\n');
  const labelId = parseInt(prompt('Label for annotation?\n' + labelPrompt));
  const labelObj = labels.find(l => l.id === labelId);
  if (labelObj) {
    fetch('/annotations/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        image_id: imageId,
        label_id: labelId,
        points: currentPoints
      })
    }).then(() => {
      existingAnnotations.push({label: labelObj.name, points: currentPoints});
      currentPoints = [];
      drawAnnotations();
    });
  } else {
    currentPoints = [];
    drawAnnotations();
  }
});

const answersForm = document.getElementById('answers-form');
const noQuestionsMessage = document.getElementById('no-questions-message');
const questionTextEl = document.getElementById('question-text');
const optionsContainer = document.getElementById('question-options');
const prevQuestionBtn = document.getElementById('prev-question-btn');
const nextQuestionBtn = document.getElementById('next-question-btn');
const progressTextEl = document.getElementById('question-progress');
const submitAnswersBtn = document.getElementById('submit-answers-btn');
let currentQuestionIndex = 0;

function initializeQuestionnaire() {
  if (!answersForm || !noQuestionsMessage || !questionTextEl || !optionsContainer || !prevQuestionBtn || !nextQuestionBtn || !progressTextEl || !submitAnswersBtn) {
    return;
  }
  if (questionsData.length === 0) {
    noQuestionsMessage.classList.remove('d-none');
    answersForm.classList.add('d-none');
    return;
  }
  noQuestionsMessage.classList.add('d-none');
  answersForm.classList.remove('d-none');

  prevQuestionBtn.addEventListener('click', () => {
    if (currentQuestionIndex > 0) {
      goToQuestion(currentQuestionIndex - 1);
    }
  });

  nextQuestionBtn.addEventListener('click', () => {
    if (currentQuestionIndex === questionsData.length - 1) {
      answersForm.requestSubmit();
    } else {
      goToQuestion(currentQuestionIndex + 1);
    }
  });

  renderQuestion();
}

function goToQuestion(index) {
  if (index < 0 || index >= questionsData.length) {
    return;
  }
  currentQuestionIndex = index;
  renderQuestion();
}

function renderQuestion() {
  const question = questionsData[currentQuestionIndex];
  if (!question) {
    return;
  }
  questionTextEl.textContent = question.text;
  progressTextEl.textContent = `Domanda ${currentQuestionIndex + 1} di ${questionsData.length}`;
  optionsContainer.innerHTML = '';
  question.options.forEach(opt => {
    const wrapper = document.createElement('div');
    wrapper.className = 'form-check';
    const input = document.createElement('input');
    input.className = 'form-check-input';
    input.type = 'radio';
    input.name = `q${question.id}`;
    input.id = `opt${question.id}_${opt.id}`;
    input.value = opt.id;
    if (answersCache[question.id] === opt.id) {
      input.checked = true;
    }
    input.addEventListener('change', () => {
      answersCache[question.id] = opt.id;
      if (currentQuestionIndex < questionsData.length - 1) {
        goToQuestion(currentQuestionIndex + 1);
      } else {
        updateNavigationState();
      }
    });
    const labelEl = document.createElement('label');
    labelEl.className = 'form-check-label';
    labelEl.setAttribute('for', input.id);
    labelEl.textContent = opt.text;
    wrapper.appendChild(input);
    wrapper.appendChild(labelEl);
    optionsContainer.appendChild(wrapper);
  });
  updateNavigationState();
}

function updateNavigationState() {
  const isFirst = currentQuestionIndex === 0;
  const isLast = currentQuestionIndex === questionsData.length - 1;
  prevQuestionBtn.disabled = isFirst;
  nextQuestionBtn.textContent = isLast ? 'Completa' : 'Successiva';
  nextQuestionBtn.classList.toggle('btn-success', isLast);
  nextQuestionBtn.classList.toggle('btn-primary', !isLast);
  const currentQuestionId = questionsData[currentQuestionIndex]?.id;
  const hasAnswer =
    currentQuestionId != null && Object.prototype.hasOwnProperty.call(answersCache, currentQuestionId);
  nextQuestionBtn.disabled = !hasAnswer;
  const missingAnswers = questionsData.some(
    q => !Object.prototype.hasOwnProperty.call(answersCache, q.id)
  );
  submitAnswersBtn.disabled = missingAnswers;
}

initializeQuestionnaire();

answersForm?.addEventListener('submit', async e => {
  e.preventDefault();
  if (questionsData.length === 0) {
    return;
  }
  const missingAnswers = questionsData.some(
    q => !Object.prototype.hasOwnProperty.call(answersCache, q.id)
  );
  if (missingAnswers) {
    alert('Rispondi a tutte le domande prima di salvare.');
    return;
  }
  const headers = {
    'Content-Type': 'application/json'
  };
  if (token) {
    headers['Authorization'] = `Bearer ${token}`;
  }
  try {
    await Promise.all(questionsData.map(question => {
      const selectedOptionId = answersCache[question.id];
      return fetch('/answers/', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          image_id: imageId,
          question_id: question.id,
          selected_option_id: selectedOptionId
        })
      }).then(response => {
        if (!response.ok) {
          throw new Error('Impossibile salvare la risposta');
        }
      });
    }));
    alert('Risposte salvate');
  } catch (error) {
    console.error(error);
    alert('Si è verificato un errore durante il salvataggio delle risposte.');
  }
});
</script>
{% endblock %}
