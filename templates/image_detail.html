{% extends "base.html" %}
{% block content %}
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;">
  <div id="save-toast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="save-toast-body">Risposte salvate</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Chiudi"></button>
    </div>
  </div>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
  <a class="btn btn-outline-secondary {% if not prev_id %}disabled{% endif %}" {% if prev_id %}href="/ui/images/{{ prev_id }}"{% else %}href="#" tabindex="-1" aria-disabled="true"{% endif %}>&laquo; Precedente</a>
  <div class="flex-grow-1 px-3 text-center">
    <h1 class="m-0">{{ image.filename }}</h1>
    <span class="badge {% if image.image_type %}bg-info text-dark{% else %}bg-light text-muted{% endif %} mt-2">
      {% if image.image_type %}Tipo: {{ image.image_type.name }}{% else %}Tipo non assegnato{% endif %}
    </span>
  </div>
  <a class="btn btn-outline-secondary {% if not next_id %}disabled{% endif %}" {% if next_id %}href="/ui/images/{{ next_id }}"{% else %}href="#" tabindex="-1" aria-disabled="true"{% endif %}>Successiva &raquo;</a>
</div>
<div id="image-wrapper" style="position:relative; display:inline-block;">
  <img id="image" src="{{ image_url }}" class="img-fluid" alt="{{ image.filename }}">
  <canvas id="canvas" style="position:absolute; left:0; top:0;"></canvas>
</div>

<h2 class="mt-4">Domande</h2>
<div id="questionnaire">
  <p id="no-questions-message" class="text-muted mb-0">Nessuna domanda disponibile per questa immagine.</p>
  <form id="answers-form" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span id="question-progress" class="fw-semibold"></span>
      <div>
        <button type="button" class="btn btn-outline-secondary me-2" id="prev-question-btn">Domanda precedente</button>
        <button type="button" class="btn btn-primary" id="next-question-btn">Domanda successiva</button>
      </div>
    </div>
    <div id="question-body">
      <p id="question-text" class="h5"></p>
      <div id="question-options"></div>
    </div>
    <div class="mt-4 d-flex justify-content-end">
      <button type="submit" class="btn btn-success" id="submit-answers-btn">Salva risposte</button>
    </div>
  </form>
</div>

<script>
// Keyboard navigation with arrow keys
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && {{ 'true' if prev_id else 'false' }}) {
    window.location.href = '/ui/images/{{ prev_id }}';
  } else if (e.key === 'ArrowRight' && {{ 'true' if next_id else 'false' }}) {
    window.location.href = '/ui/images/{{ next_id }}';
  }
});

const token = "{{ token }}";
const imageId = {{ image.id }};
const img = document.getElementById('image');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const existingAnnotations = {{ annotations | tojson }};
const labels = {{ labels | tojson }};
const questionsData = {{ questions_data | tojson }};
const answersCache = {{ answer_map | tojson }};

function resizeCanvas() {
  canvas.width = img.clientWidth;
  canvas.height = img.clientHeight;
  drawAnnotations();
}

img.onload = resizeCanvas;
window.onresize = resizeCanvas;

let currentPoints = [];

function drawAnnotations() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  existingAnnotations.forEach(a => {
    ctx.beginPath();
    a.points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.strokeStyle = 'red';
    ctx.stroke();
    const first = a.points[0];
    ctx.fillStyle = 'red';
    ctx.fillText(a.label, first.x, first.y - 4);
  });
  if (currentPoints.length > 0) {
    ctx.beginPath();
    currentPoints.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.strokeStyle = 'red';
    ctx.stroke();
  }
}

canvas.addEventListener('click', e => {
  currentPoints.push({x: e.offsetX, y: e.offsetY});
  drawAnnotations();
});

canvas.addEventListener('dblclick', () => {
  if (currentPoints.length < 3) {
    currentPoints = [];
    drawAnnotations();
    return;
  }
  const labelPrompt = labels.map(l => `${l.id}: ${l.name}`).join('\n');
  const labelId = parseInt(prompt('Label for annotation?\n' + labelPrompt));
  const labelObj = labels.find(l => l.id === labelId);
  if (labelObj) {
    fetch('/annotations/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        image_id: imageId,
        label_id: labelId,
        points: currentPoints
      })
    }).then(() => {
      existingAnnotations.push({label: labelObj.name, points: currentPoints});
      currentPoints = [];
      drawAnnotations();
    });
  } else {
    currentPoints = [];
    drawAnnotations();
  }
});

const answersForm = document.getElementById('answers-form');
const noQuestionsMessage = document.getElementById('no-questions-message');
const questionTextEl = document.getElementById('question-text');
const optionsContainer = document.getElementById('question-options');
const prevQuestionBtn = document.getElementById('prev-question-btn');
const nextQuestionBtn = document.getElementById('next-question-btn');
const progressTextEl = document.getElementById('question-progress');
const submitAnswersBtn = document.getElementById('submit-answers-btn');
const toastElement = document.getElementById('save-toast');
const toastBody = document.getElementById('save-toast-body');
let saveToastInstance = null;
const questionMap = new Map();
const dependentsByOption = new Map();
const dependentsByQuestion = new Map();
const baseQuestionIds = [];
let activeQuestionIds = [];
let currentQuestionIndex = 0;

questionsData.forEach((question, index) => {
  const orderValue = typeof question.order === 'number' ? question.order : index;
  question.order = orderValue;
  questionMap.set(question.id, question);
  if (question.depends_on_option_id && question.depends_on_question_id) {
    if (!dependentsByOption.has(question.depends_on_option_id)) {
      dependentsByOption.set(question.depends_on_option_id, []);
    }
    dependentsByOption.get(question.depends_on_option_id).push(question.id);

    if (!dependentsByQuestion.has(question.depends_on_question_id)) {
      dependentsByQuestion.set(question.depends_on_question_id, []);
    }
    dependentsByQuestion.get(question.depends_on_question_id).push(question.id);
  } else {
    baseQuestionIds.push(question.id);
  }
});

const sortByOrder = (a, b) => {
  const orderA = questionMap.get(a)?.order ?? 0;
  const orderB = questionMap.get(b)?.order ?? 0;
  return orderA - orderB;
};

for (const list of dependentsByOption.values()) {
  list.sort(sortByOrder);
}
for (const list of dependentsByQuestion.values()) {
  list.sort(sortByOrder);
}
baseQuestionIds.sort(sortByOrder);

function computeActiveQuestionIds() {
  const sequence = [];
  const visited = new Set();

  const addQuestionWithDependents = questionId => {
    if (visited.has(questionId)) {
      return;
    }
    const question = questionMap.get(questionId);
    if (!question) {
      return;
    }
    if (question.depends_on_option_id && question.depends_on_question_id) {
      const parentAnswer = answersCache[question.depends_on_question_id];
      if (parentAnswer !== question.depends_on_option_id) {
        return;
      }
    }
    visited.add(questionId);
    sequence.push(questionId);

    const selectedOptionId = answersCache[questionId];
    if (selectedOptionId != null) {
      const dependents = dependentsByOption.get(selectedOptionId) || [];
      dependents.forEach(addQuestionWithDependents);
    }
  };

  baseQuestionIds.forEach(addQuestionWithDependents);
  return sequence;
}

function clearDependentAnswers(questionId) {
  const queue = [...(dependentsByQuestion.get(questionId) || [])];
  const visited = new Set(queue);
  while (queue.length) {
    const dependentId = queue.shift();
    if (Object.prototype.hasOwnProperty.call(answersCache, dependentId)) {
      delete answersCache[dependentId];
    }
    const nested = dependentsByQuestion.get(dependentId) || [];
    nested.forEach(childId => {
      if (!visited.has(childId)) {
        visited.add(childId);
        queue.push(childId);
      }
    });
  }
}

function pruneInactiveAnswers() {
  const activeSet = new Set(computeActiveQuestionIds());
  Object.keys(answersCache).forEach(key => {
    const questionId = Number(key);
    if (!Number.isFinite(questionId) || !activeSet.has(questionId)) {
      delete answersCache[questionId];
    }
  });
}

function showToast(message, isError = false) {
  if (!toastElement) {
    console.warn('Toast element not found');
    return;
  }
  if (!saveToastInstance) {
    saveToastInstance = bootstrap.Toast.getOrCreateInstance(toastElement, {
      autohide: true,
      delay: 2500
    });
  }
  if (toastBody) {
    toastBody.textContent = message;
  }
  toastElement.classList.toggle('text-bg-danger', Boolean(isError));
  toastElement.classList.toggle('text-bg-success', !isError);
  saveToastInstance.show();
}

function recomputeActiveQuestions(preserveCurrentId = true) {
  const previousId = preserveCurrentId ? activeQuestionIds[currentQuestionIndex] : undefined;
  activeQuestionIds = computeActiveQuestionIds();
  if (activeQuestionIds.length === 0) {
    currentQuestionIndex = 0;
    return undefined;
  }
  if (preserveCurrentId && previousId != null) {
    const idx = activeQuestionIds.indexOf(previousId);
    if (idx !== -1) {
      currentQuestionIndex = idx;
      return activeQuestionIds[currentQuestionIndex];
    }
  }
  if (currentQuestionIndex >= activeQuestionIds.length) {
    currentQuestionIndex = activeQuestionIds.length - 1;
  }
  if (currentQuestionIndex < 0) {
    currentQuestionIndex = 0;
  }
  return activeQuestionIds[currentQuestionIndex];
}

function renderQuestion(preserveCurrentId = true) {
  const currentQuestionId = recomputeActiveQuestions(preserveCurrentId);
  if (!answersForm || !noQuestionsMessage || !questionTextEl || !optionsContainer || !prevQuestionBtn || !nextQuestionBtn || !progressTextEl || !submitAnswersBtn) {
    return;
  }
  if (activeQuestionIds.length === 0) {
    noQuestionsMessage.classList.remove('d-none');
    answersForm.classList.add('d-none');
    progressTextEl.textContent = '';
    optionsContainer.innerHTML = '';
    updateNavigationState();
    return;
  }
  noQuestionsMessage.classList.add('d-none');
  answersForm.classList.remove('d-none');

  const question = questionMap.get(currentQuestionId);
  if (!question) {
    return;
  }
  progressTextEl.textContent = `Domanda ${currentQuestionIndex + 1} di ${activeQuestionIds.length}`;
  questionTextEl.textContent = question.text;
  optionsContainer.innerHTML = '';
  question.options.forEach(opt => {
    const wrapper = document.createElement('div');
    wrapper.className = 'form-check';
    const input = document.createElement('input');
    input.className = 'form-check-input';
    input.type = 'radio';
    input.name = `q${question.id}`;
    input.id = `opt${question.id}_${opt.id}`;
    input.value = opt.id;
    if (answersCache[question.id] === opt.id) {
      input.checked = true;
    }
    input.addEventListener('change', () => {
      const previousAnswer = answersCache[question.id];
      if (previousAnswer !== opt.id) {
        answersCache[question.id] = opt.id;
        if (previousAnswer !== undefined) {
          clearDependentAnswers(question.id);
        }
      } else {
        answersCache[question.id] = opt.id;
      }
      renderQuestion();
      goToNextQuestion();
    });
    const labelEl = document.createElement('label');
    labelEl.className = 'form-check-label';
    labelEl.setAttribute('for', input.id);
    labelEl.textContent = opt.text;
    wrapper.appendChild(input);
    wrapper.appendChild(labelEl);
    optionsContainer.appendChild(wrapper);
  });
  updateNavigationState();
}

function goToNextQuestion() {
  if (currentQuestionIndex < activeQuestionIds.length - 1) {
    currentQuestionIndex += 1;
    renderQuestion(false);
  } else {
    updateNavigationState();
  }
}

function goToPreviousQuestion() {
  if (currentQuestionIndex > 0) {
    currentQuestionIndex -= 1;
    renderQuestion(false);
  }
}

function updateNavigationState() {
  const hasQuestions = activeQuestionIds.length > 0;
  const isFirst = currentQuestionIndex === 0;
  const isLast = hasQuestions && currentQuestionIndex === activeQuestionIds.length - 1;
  prevQuestionBtn.disabled = !hasQuestions || isFirst;
  nextQuestionBtn.textContent = isLast ? 'Completa' : 'Successiva';
  nextQuestionBtn.classList.toggle('btn-success', isLast);
  nextQuestionBtn.classList.toggle('btn-primary', !isLast);
  const currentQuestionId = hasQuestions ? activeQuestionIds[currentQuestionIndex] : undefined;
  const hasAnswer = currentQuestionId != null && Object.prototype.hasOwnProperty.call(answersCache, currentQuestionId);
  nextQuestionBtn.disabled = !hasQuestions || !hasAnswer;
  const missingAnswers = activeQuestionIds.some(
    questionId => !Object.prototype.hasOwnProperty.call(answersCache, questionId)
  );
  submitAnswersBtn.disabled = !hasQuestions || missingAnswers;
}

function initializeQuestionnaire() {
  if (!answersForm || !noQuestionsMessage || !questionTextEl || !optionsContainer || !prevQuestionBtn || !nextQuestionBtn || !progressTextEl || !submitAnswersBtn) {
    return;
  }
  if (questionsData.length === 0) {
    noQuestionsMessage.classList.remove('d-none');
    answersForm.classList.add('d-none');
    return;
  }
  pruneInactiveAnswers();
  prevQuestionBtn.addEventListener('click', () => {
    goToPreviousQuestion();
  });
  nextQuestionBtn.addEventListener('click', () => {
    if (activeQuestionIds.length === 0) {
      return;
    }
    if (currentQuestionIndex === activeQuestionIds.length - 1) {
      answersForm.requestSubmit();
    } else {
      currentQuestionIndex += 1;
      renderQuestion(false);
    }
  });
  renderQuestion();
}

initializeQuestionnaire();

answersForm?.addEventListener('submit', async e => {
  e.preventDefault();
  pruneInactiveAnswers();
  recomputeActiveQuestions();
  if (activeQuestionIds.length === 0) {
    showToast('Non sono presenti domande da salvare.', true);
    return;
  }
  const missingAnswers = activeQuestionIds.some(
    questionId => !Object.prototype.hasOwnProperty.call(answersCache, questionId)
  );
  if (missingAnswers) {
    showToast('Rispondi a tutte le domande prima di salvare.', true);
    return;
  }
  const headers = {
    'Content-Type': 'application/json'
  };
  if (token) {
    headers['Authorization'] = `Bearer ${token}`;
  }
  try {
    await Promise.all(activeQuestionIds.map(questionId => {
      const question = questionMap.get(questionId);
      if (!question) {
        return Promise.resolve();
      }
      const selectedOptionId = answersCache[questionId];
      return fetch('/answers/', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          image_id: imageId,
          question_id: questionId,
          selected_option_id: selectedOptionId
        })
      }).then(response => {
        if (!response.ok) {
          throw new Error('Impossibile salvare la risposta');
        }
      });
    }));
    showToast('Risposte salvate');
  } catch (error) {
    console.error(error);
    showToast('Si e verificato un errore durante il salvataggio delle risposte.', true);
  } finally {
    renderQuestion();
  }
});
</script>
{% endblock %}
